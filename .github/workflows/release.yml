name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check tag matches package version
        run: |
          pkg_version=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "pyproject version ($pkg_version) != tag ($tag_version)" >&2
            exit 1
          fi
      - name: Build sdist and wheel
        run: pipx run build
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Install or upgrade with pipx (macOS / Windows / Linux):

            ```
            pipx install git+https://github.com/oussamachaabounii/okapi@${{ github.ref_name }}
            ```

            or from the attached wheel:

            ```
            pip install <downloaded .whl>
            ```
